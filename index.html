<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Dark Mode Converter</title>
    <meta name="description" content="A secure, client-side tool to convert PDF files to dark mode for easier reading.">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "PDF Dark Mode Converter",
      "operatingSystem": "Web Browser",
      "applicationCategory": "UtilityApplication",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "description": "A secure, client-side tool to convert PDF files to dark mode for easier reading.",
      "featureList": "Offline processing, Multiple dark themes, Privacy-focused"
    }
    </script>

    <style>
        :root {
            --accent: #0056d2;
            --accent-contrast: #ffffff;
            --focus-glow: #7fb3ff;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
        }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #121212;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { font-weight: 600; }
        .notice {
            background-color: #1e1e1e;
            padding: 10px;
            border-radius: 5px;
            margin: 20px auto;
            font-size: 14px;
            color: #bbb;
            max-width: 80%;
        }
        .file-input { display: none; }
        .custom-file-upload {
            display: inline-block;
            padding: 10px 15px;
            background-color: var(--accent);
            color: var(--accent-contrast);
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            line-height: 1.2;
            border: 1px solid var(--accent);
        }
        .custom-file-upload:focus-visible {
            outline: 3px solid var(--focus-glow);
            outline-offset: 2px;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .theme-selector {
            padding: 10px 15px;
            background-color: #2a2a2a;
            color: white;
            border: 1px solid #444;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .theme-selector:focus {
            outline: none;
            border-color: var(--accent);
        }
        canvas {
            border: 1px solid #555;
            margin-top: 10px;
            width: 100%;
        }
        #pdfContainer {
            width: 70%;
            margin: 0 auto;
        }
        #progressContainer {
            width: 80%;
            max-width: 400px;
            background-color: #222;
            display: none;
            padding: 10px;
            border-radius: 5px;
            margin: 20px auto;
            text-align: center;
        }
        #progressBar {
            height: 20px;
            background-color: var(--accent);
            width: 0;
            line-height: 20px;
            color: var(--accent-contrast);
            border-radius: 5px;
            transition: width 0.3s ease-in-out;
        }
        #progressText {
            margin-top: 5px;
            color: white;
            font-weight: bold;
        }
        #downloadBtn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: var(--accent);
            color: var(--accent-contrast);
            border: none;
            cursor: pointer;
            display: none;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            border-radius: 5px;
        }
        #downloadBtn:focus-visible {
            outline: 3px solid var(--focus-glow);
            outline-offset: 2px;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .dropzone-hover { outline: 3px dashed var(--accent); outline-offset: -10px; }
        @media (max-width: 768px) {
            .notice { font-size: 12px; }
            .controls { flex-direction: column; }
            #pdfContainer { width: 95%; }
        }
    </style>
</head>
<body>
    <main class="container" id="mainContent" role="main">
        <div class="notice">
            🔒 100% offline. No internet, no uploads, no servers — your PDF never leaves your device.
        </div>
        <h1>PDF Dark Mode Converter</h1>
        <div class="controls">
            <label for="fileInput" class="custom-file-upload">Choose PDF File</label>
            <label class="sr-only" for="themeSelector">Theme</label>
            <select id="themeSelector" class="theme-selector">
                <option value="classic" selected>Pure Black</option>
                <option value="claude">Claude Warm</option>
                <option value="chatgpt">ChatGPT Cool</option>
                <option value="sepia">Sepia Dark</option>
                <option value="midnight">Midnight Blue</option>
                <option value="forest">Forest Green</option>
            </select>
        </div>
        <input type="file" id="fileInput" class="file-input" accept="application/pdf">
        <div id="progressContainer" aria-live="polite">
            <div id="progressBar"></div>
            <div id="progressText">0/0</div>
        </div>
        <button id="downloadBtn">Download failed? Click here</button>
        <div id="pdfContainer"></div>
    </main>

    <script>
        let modifiedPdfBytes;
        let originalPdfData = null;
        let originalFileName = "";
        let currentRenderId = 0;

        // Theme definitions: target page-background color (dark). Text is mapped toward white.
        const themes = {
            classic:  { r: 0,  g: 0,  b: 0,  name: 'Classic' },
            claude:   { r: 42, g: 37, b: 34, name: 'Claude Warm' },
            chatgpt:  { r: 52, g: 53, b: 65, name: 'ChatGPT Cool' },
            sepia:    { r: 40, g: 35, b: 25, name: 'Sepia' },
            midnight: { r: 25, g: 30, b: 45, name: 'Midnight Blue' },
            forest:   { r: 25, g: 35, b: 30, name: 'Forest Green' }
        };

        // Libraries are vendored locally in ./vendor — fully offline, no network needed.
        const pdfJsSrc     = "./vendor/pdf.min.js";
        const pdfWorkerSrc  = "./vendor/pdf.worker.min.js";
        const pdfLibSrc     = "./vendor/pdf-lib.min.js";

        // JPEG quality for embedded page images (0–1). Lower = smaller files. Great for ebooks.
        const JPEG_QUALITY = 0.82;

        // Render resolution multiplier. 3 = sharpest/largest (~216 ppi), 2 ≈ 144 ppi, 1.5 ≈ 108 ppi.
        // Lower this if a big ebook produces too large a file.
        const RENDER_SCALE = 3;

        let pdfLibReadyPromise = null;

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = resolve;
                s.onerror = reject;
                document.head.appendChild(s);
            });
        }

        function loadPdfLibraries() {
            if (pdfLibReadyPromise) return pdfLibReadyPromise;
            pdfLibReadyPromise = (async () => {
                await loadScript(pdfJsSrc);
                pdfjsLib.GlobalWorkerOptions.workerSrc = pdfWorkerSrc;
                await loadScript(pdfLibSrc);
            })();
            return pdfLibReadyPromise;
        }

        async function ensurePdfLibraries() {
            try {
                await loadPdfLibraries();
            } catch (e) {
                alert("Unable to load the local PDF libraries. Make sure the ./vendor folder sits next to index.html.");
                throw e;
            }
        }

        function applyThemeBackground(theme) {
            document.body.style.backgroundColor = `rgb(${theme.r}, ${theme.g}, ${theme.b})`;
        }

        applyThemeBackground(themes[document.getElementById('themeSelector').value]);

        function handleFile(file) {
            if (!file || file.type !== 'application/pdf') {
                alert("Please choose a PDF file.");
                return;
            }
            originalFileName = file.name.replace(/\.pdf$/i, '');
            const fileReader = new FileReader();
            fileReader.onload = async function() {
                const fileData = new Uint8Array(this.result);
                await ensurePdfLibraries();
                originalPdfData = fileData;
                const progressContainer = document.getElementById('progressContainer');
                progressContainer.style.display = 'block';
                document.getElementById('downloadBtn').style.display = 'none';
                await renderPDF(fileData);
            };
            fileReader.readAsArrayBuffer(file);
        }

        document.getElementById('fileInput').addEventListener('change', function(event) {
            if (event.target.files.length > 0) handleFile(event.target.files[0]);
        });

        document.body.addEventListener('dragover', function(event) {
            event.preventDefault();
            document.body.classList.add('dropzone-hover');
        });
        document.body.addEventListener('dragleave', function() {
            document.body.classList.remove('dropzone-hover');
        });
        document.body.addEventListener('drop', function(event) {
            event.preventDefault();
            document.body.classList.remove('dropzone-hover');
            if (event.dataTransfer.files.length > 0) handleFile(event.dataTransfer.files[0]);
        });

        document.getElementById('themeSelector').addEventListener('change', async function() {
            const selectedTheme = document.getElementById('themeSelector').value;
            applyThemeBackground(themes[selectedTheme]);
            if (originalPdfData) {
                await ensurePdfLibraries();
                const progressContainer = document.getElementById('progressContainer');
                progressContainer.style.display = 'block';
                document.getElementById('downloadBtn').style.display = 'none';
                await renderPDF(originalPdfData);
            }
        });

        document.querySelector('.custom-file-upload').addEventListener('click', () => {
            loadPdfLibraries().catch(() => {});
        });

        async function renderPDF(pdfData) {
            const renderId = ++currentRenderId;
            const selectedTheme = document.getElementById('themeSelector').value;
            const theme = themes[selectedTheme];
            applyThemeBackground(theme);

            // pdf.js transfers the underlying buffer to its worker, which detaches it.
            // Clone so the original data stays usable for theme switches / re-renders.
            const pdf = await pdfjsLib.getDocument({ data: pdfData.slice() }).promise;
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const pdfContainer = document.getElementById('pdfContainer');
            const progressContainer = document.getElementById('progressContainer');
            modifiedPdfBytes = null;
            progressBar.style.width = '0';
            progressText.innerText = `0/${pdf.numPages}`;
            pdfContainer.innerHTML = '';

            const CHUNK_SIZE = 50; // Process pages in chunks to cap memory use.
            const chunks = [];
            const totalPages = pdf.numPages;

            for (let chunkStart = 0; chunkStart < totalPages; chunkStart += CHUNK_SIZE) {
                if (renderId !== currentRenderId) return;

                const chunkDoc = await PDFLib.PDFDocument.create();
                const chunkEnd = Math.min(chunkStart + CHUNK_SIZE, totalPages);

                for (let i = chunkStart; i < chunkEnd; i++) {
                    if (renderId !== currentRenderId) return;

                    const percent = ((i + 1) / totalPages) * 100;
                    progressBar.style.width = `${percent}%`;
                    progressText.innerText = `${i + 1}/${totalPages}`;

                    const page = await pdf.getPage(i + 1);
                    const viewport = page.getViewport({ scale: RENDER_SCALE });
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;

                    await page.render({ canvasContext: ctx, viewport: viewport }).promise;
                    if (renderId !== currentRenderId) return;

                    // Apply dark-mode recolor: brightness-based mapping.
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;
                    const bgR = theme.r, bgG = theme.g, bgB = theme.b;

                    for (let j = 0; j < data.length; j += 4) {
                        const r = data[j], g = data[j + 1], b = data[j + 2];
                        const brightness = 0.299 * r + 0.587 * g + 0.114 * b;
                        const factor = 1 - (brightness / 255); // 0 = white bg -> theme bg, 1 = black ink -> white
                        data[j]     = bgR + (255 - bgR) * factor;
                        data[j + 1] = bgG + (255 - bgG) * factor;
                        data[j + 2] = bgB + (255 - bgB) * factor;
                    }
                    ctx.putImageData(imageData, 0, 0);
                    if (renderId !== currentRenderId) return;

                    // Preview the first 20 pages only.
                    if (i < 20) {
                        canvas.style.maxWidth = '100%';
                        canvas.style.height = 'auto';
                        pdfContainer.appendChild(canvas);
                    }

                    // JPEG keeps output small — important for long ebooks.
                    const imgBytes = await new Promise(resolve =>
                        canvas.toBlob(blob => blob.arrayBuffer().then(resolve), 'image/jpeg', JPEG_QUALITY));
                    if (renderId !== currentRenderId) return;

                    const jpgImage = await chunkDoc.embedJpg(imgBytes);
                    const newPage = chunkDoc.addPage([viewport.width, viewport.height]);
                    newPage.drawImage(jpgImage, { x: 0, y: 0, width: viewport.width, height: viewport.height });

                    // Free off-screen canvases to help GC.
                    if (i >= 20) {
                        canvas.width = 1;
                        canvas.height = 1;
                    }
                    page.cleanup();
                }

                if (renderId !== currentRenderId) return;
                chunks.push(await chunkDoc.save());
                await new Promise(resolve => setTimeout(resolve, 10)); // let the UI breathe
            }

            if (renderId !== currentRenderId) return;
            progressText.innerText = "Merging PDF chunks… this may take a moment.";

            const finalPdfDoc = await PDFLib.PDFDocument.create();
            for (let i = 0; i < chunks.length; i++) {
                if (renderId !== currentRenderId) return;
                const chunkDoc = await PDFLib.PDFDocument.load(chunks[i]);
                const copiedPages = await finalPdfDoc.copyPages(chunkDoc, chunkDoc.getPageIndices());
                copiedPages.forEach(p => finalPdfDoc.addPage(p));
                chunks[i] = null;
            }

            progressText.innerText = "Finalizing…";
            modifiedPdfBytes = await finalPdfDoc.save();
            if (renderId !== currentRenderId) return;

            progressContainer.style.display = 'none';
            triggerDownload();
        }

        function triggerDownload() {
            if (!modifiedPdfBytes) return;
            const selectedTheme = document.getElementById('themeSelector').value;
            const themeName = themes[selectedTheme].name.toLowerCase().replace(/\s+/g, '_');
            const blob = new Blob([modifiedPdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${originalFileName}_${themeName}_dark.pdf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(link.href);
            document.getElementById('downloadBtn').style.display = 'block';
        }

        document.getElementById('downloadBtn').addEventListener('click', triggerDownload);
    </script>
</body>
</html>
